services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  mlflow:
    image: python:3.11-slim
    working_dir: /mlflow
    ports:
      - "5001:5001"
    volumes:
      - ./mlflow:/mlflow
    command: sh -c "pip install --no-cache-dir mlflow==2.19.0 && mlflow server --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root /mlflow/artifacts --host 0.0.0.0 --port 5001"

  sqlite-ui:
    image: coleifer/sqlite-web:latest
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/data
    command: ["sqlite_web", "/data/css_prep_ai.db", "--host", "0.0.0.0", "--port", "8080"]
